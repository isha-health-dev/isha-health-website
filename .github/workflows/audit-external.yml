name: External link audit (weekly)

on:
  schedule:
    - cron: '0 8 * * 0' # Sundays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  external-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sitemap URLs
        run: |
          curl -fsS https://isha.health/sitemap.xml \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed -E 's|</?loc>||g' \
            > sitemap-urls.txt
          echo "URLs to audit: $(wc -l < sitemap-urls.txt)"

      - name: Run lychee against sitemap URLs
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --config audits/lychee.toml --input-files sitemap-urls.txt
          output: ./lychee-report.md
          fail: false

      - name: Open issue on failure
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly site audit — broken / redirected links'
          content-filepath: ./lychee-report.md
          labels: audit, seo
